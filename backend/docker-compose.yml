version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: crowndine-image
    container_name: crowndine-app
    restart: always
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USERNAME: user
      DATABASE_PASSWORD: 123456

  mysql:
    image: mysql:8.0
    container_name: crowndine_db
    restart: always
    environment:
      MYSQL_DATABASE: crowndine
      MYSQL_USER: user
      MYSQL_PASSWORD: 123456
      MYSQL_ROOT_PASSWORD: 1234567
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - '3306:3306'
volumes:
  mysql_data: