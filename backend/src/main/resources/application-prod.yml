spring:
  config:
    activate:
      on-profile: prod
  devtools:
    add-properties: true
  datasource:
    url: jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:crowndine}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:123456}
    hikari: # Connection poll
      max-lifetime: 300000 # 5 phút
      idle-timeout: 60000 # 1 phút
      validation-timeout: 5000 # 5 giây
      minimum-idle: 5
      maximum-pool-size: 20
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  mail:
    from: ${MAIL_USERNAME}
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0.7

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

openapi:
  service:
    api-docs: backend-service
    server: http://localhost:${server.port}
    title: Backend service
    version: 1.0.0

jwt:
  access-key: ${JWT_ACCESS_KEY}
  refresh-key: ${JWT_REFRESH_KEY}
  reset-password-key: ${JWT_RESET_PASSWORD_KEY}
  # 15 phút
  access-key-expiration: ${JWT_ACCESS_KEY_EXPIRATION:900000}
  # 7 ngày
  refresh-key-expiration: ${JWT_REFRESH_KEY_EXPIRATION:604800000}
  # 10 phút
  reset-password-key-expiration: ${JWT_RESET_PASSWORD_KEY_EXPIRATION:600000}

#Clooudinary
cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME}
  api_key: ${CLOUDINARY_API_KEY}
  api_secret: ${CLOUDINARY_API_SECRET}

#PayOS
payos:
  client-id: ${PAYOS_CLIENT_ID}
  api-key: ${PAYOS_API_KEY}
  checksum-key: ${PAYOS_CHECKSUM_KEY}
  return-url: ${PAYOS_RETURN_URL}
  cancel-url: ${PAYOS_CANCEL_URL}

google:
  client-id: ${GOOGLE_CLIENT_ID}

gemini:
  api:
    keys: ${GEMINI_API_KEYS}
    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-001:generateContent}
  model: ${GEMINI_MODEL:models/gemini-2.0-flash-001}

openrouter:
  api:
    key: ${OPENROUTER_API_KEY}

app:
  frontend-url: ${FRONTEND_BASE_URL:https://crown-dine.vercel.app}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://crown-dine.vercel.app}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://crown-dine.vercel.app,https://*.vercel.app}
  websocket:
    allowed-origin-patterns: ${WS_ALLOWED_ORIGIN_PATTERNS:https://crown-dine.vercel.app}

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.springframework.jdbc: WARN
    com.zaxxer.hikari: INFO
