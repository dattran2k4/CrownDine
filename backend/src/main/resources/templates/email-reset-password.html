<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đặt lại mật khẩu</title>
</head>
<body style="margin:0;padding:0;background:#f7f7f7;font-family:Arial,sans-serif;color:#1f2937;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f7f7f7;padding:24px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:12px;overflow:hidden;">
                <tr>
                    <td style="padding:32px;">
                        <h1 style="margin:0 0 16px;font-size:24px;line-height:32px;">Đặt lại mật khẩu CrownDine</h1>
                        <p style="margin:0 0 16px;font-size:15px;line-height:24px;">
                            Chúng tôi đã nhận được yêu cầu đặt lại mật khẩu cho tài khoản của bạn.
                        </p>
                        <p style="margin:0 0 24px;font-size:15px;line-height:24px;">
                            Liên kết dưới đây có hiệu lực trong <strong>10 phút</strong>.
                        </p>
                        <p style="margin:0 0 24px;">
                            <a th:href="${resetPasswordLink}"
                               style="display:inline-block;background:#111827;color:#ffffff;text-decoration:none;padding:12px 20px;border-radius:8px;font-weight:600;">
                                Đặt lại mật khẩu
                            </a>
                        </p>
                        <p style="margin:0 0 12px;font-size:14px;line-height:22px;color:#4b5563;">
                            Nếu nút không hoạt động, bạn có thể mở liên kết sau:
                        </p>
                        <p style="margin:0 0 24px;font-size:14px;line-height:22px;word-break:break-all;">
                            <a th:href="${resetPasswordLink}" th:text="${resetPasswordLink}" style="color:#2563eb;"></a>
                        </p>
                        <p style="margin:0;font-size:14px;line-height:22px;color:#6b7280;">
                            Nếu bạn không yêu cầu đặt lại mật khẩu, hãy bỏ qua email này.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
